<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
</head>
<body>
        <div class="container">
            
                <div class="projects-container">
                <h2 class="projects-title">My projects</h2>

                <div class="projects">
                </div>

                <form class="projects-form visibility" method="get">
                    <input type="text" name="project" class="projects-form-name" placeholder="Add your project">
                    <button class="projects-form-btn" type="submit">+</button>
                </form>

                <button class="new-project-btn">Add project</button>
            </div>


            <div class="todos-container">
                <div>
                <h1>To-do list</h1>
                <div class="todo-list-div"></div>
                </div>


            <form class="todo-form visibility" method="get">
                <h2 class="todo-form-title">Add new task</h2>
                
                <label>
                   Title
                    <input type="text" name="title" id="form-title" required/>
                </label>
                
                
                <label>
                   Description
                    <input type="text" name="description" id="form-description"/>
                </label>
                
                <label>
                   Project
                   <select name="project" id="form-project">
                    </select>
                </label>
                
                <label>
                  Due date
                    <input type="date" name="date" id="form-date"/>
                </label>
                
                 
                <label>
                   Priority
                   <select name="priority" id="form-priority">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </label>
                
                <label>
                   Notes
                   <textarea name="notes" id="form-notes"></textarea>
          <!--           <input type="text" name="notes" id="form-notes"/> -->
                </label>

                <div class="form-btns">
                <button id="confirm-btn" class="confirm-btn" type="submit">Save</button>
                <button id="cancel-btn" class="cancel-btn" type="button">Cancel</button>
                </div>
            </form>

            <button class="add-btn" id="add-btn">Add new item</button>
            </div>
            
         </div>
</body>
</html>
